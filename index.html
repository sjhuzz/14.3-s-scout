const ThreatDots = ({ n, color }) => (
  <span>{[1,2,3,4,5].map(i=><span key={i} style={{ fontSize:10, color:i<=n?color:"#1e3a5f" }}>●</span>)}</span>

function Tag({ text, color=MT }) {
  const cMap = {
    [GOLD]: { bg:GOLD+"22", b:GOLD+"55" },
    [RD]:   { bg:RD+"22",   b:RD+"55"   },
    [AM]:   { bg:AM+"22",   b:AM+"55"   },
    [GR]:   { bg:GR+"22",   b:GR+"55"   },
    [MT]:   { bg:MT+"22",   b:MT+"55"   },
  };
  const s = cMap[color]||cMap[MT];
  return <span style={{ background:s.bg, border:`1px solid ${s.b}`, color, borderRadius:5, padding:"2px 7px", fontSize:10, fontWeight:700, marginRight:3, marginBottom:3, display:"inline-block" }}>{text}</span>;
}

function tagColor(tag) {
  if (tag.includes("League")) return GOLD;
  if (tag.includes("⚠️")||tag.includes("DNP")||tag.includes("Foul")) return RD;
  if (tag.includes("3PT")) return PU;
  return MT;
}

function Card({ children, accent, style={} }) {
  return <div style={{ background:C1, border:`1px solid ${accent||BD}`, borderRadius:10, padding:14, marginBottom:10, ...style }}>{children}</div>;
}

                      <div style={{ color:MT, fontSize:9 }}>{j===r.qScores.length-1?"F":`Q${j+1}`}</div>

              <div style={{ color:GOLD, fontWeight:800, fontSize:11, letterSpacing:1, marginBottom:8 }}>⭐ McKINNON SCORERS</div>
              {r.stars.map((s,j)=>(
                <div key={j} style={{ background:C1, borderRadius:8, padding:"10px 12px", marginBottom:6, borderLeft:`3px solid ${GOLD}` }}>

              {/* Opponent notes */}
              <div style={{ color:RD, fontWeight:800, fontSize:11, letterSpacing:1, marginBottom:6, marginTop:12 }}>🔍 OPPONENT INTEL</div>
              <div style={{ color:TX, fontSize:12, lineHeight:1.7, paddingLeft:8, borderLeft:`3px solid ${RD}44` }}>{r.oppNotes}</div>
              {r.momentumNote&&(
                <div style={{ background:GOLD+"11", border:`1px solid ${GOLD}44`, borderRadius:8, padding:10, marginTop:10 }}>
                  <div style={{ color:GOLD, fontWeight:800, fontSize:11, marginBottom:4 }}>💡 HEADING INTO GIPPSLAND</div>
                  <div style={{ color:TX, fontSize:12, lineHeight:1.6 }}>{r.momentumNote}</div>
                </div>
              )}
            </div>
          )}
        </div>
      ))}

      {/* Momentum note */}
      <div style={{ background:C1, border:`1px solid ${GOLD}`, borderRadius:10, padding:14 }}>
        <div style={{ color:GOLD, fontWeight:800, fontSize:12, marginBottom:10 }}>💡 HEADING INTO GIPPSLAND — MOMENTUM</div>
        {[
          "Jakovlev just put up ~18 pts vs Frankston — FTs and 2PT in every quarter. Peaking at the right time",
          "Hurren back and contributing — 10 pts vs Chelsea, scored vs Frankston. Interior depth is real",
          "Gilbert hit a 3PT vs Frankston, Lentine hit one vs Chelsea — perimeter threat is real",
          "Rodda opened scoring with FTs vs Frankston in Q1 — his post presence sets the physical tone",
          "Frankston — who scored 69+ pts in VJBL — were held to 21 pts total. McKinnon's defence is elite",
          "McKinnon 14.3 enters Gippsland off a 63–21 demolition of Frankston — best form of the season",
        ].map((t,i)=>(
          <div key={i} style={{ display:"flex", gap:8, marginBottom:8 }}>

}
